name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_DB: dominoes, POSTGRES_USER: dominoes, POSTGRES_PASSWORD: dominoes }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dominoes" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://dominoes:dominoes@localhost:5432/dominoes
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.9.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dominoes/api db:validate
      - run: pnpm --filter @dominoes/api db:deploy
      - run: pnpm check
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=desktop-chromium
      - run: docker build -f Dockerfile.api .
